<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" width="220" height="48" aria-hidden="true">
  <defs>
    <style>
      .logo-icon { fill: none; stroke-width: 0; }
      .logo-primary { fill: #ffffff; }
      .logo-accent { fill: #F97316; }
      .logo-text-bharat { fill: #ffffff; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; font-weight: 700; font-size: 22px; letter-spacing: -0.02em; }
      .logo-text-athlete { fill: #F97316; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -0.02em; }
    </style>
  </defs>
  <g id="logo-horizontal">
    <g id="icon" class="logo-icon" transform="translate(4, 4)">
      <circle cx="20" cy="20" r="18" class="logo-primary"/>
      <circle cx="20" cy="20" r="14" fill="none" stroke="#ffffff" stroke-width="1.25" opacity="0.4"/>
      <g stroke="#ffffff" stroke-width="0.8" opacity="0.5">
        <line x1="20" y1="8" x2="20" y2="14"/>
        <line x1="20" y1="26" x2="20" y2="32"/>
        <line x1="8" y1="20" x2="14" y2="20"/>
        <line x1="26" y1="20" x2="32" y2="20"/>
        <line x1="11.2" y1="11.2" x2="15.5" y2="15.5"/>
        <line x1="24.5" y1="24.5" x2="28.8" y2="28.8"/>
        <line x1="28.8" y1="11.2" x2="24.5" y2="15.5"/>
        <line x1="15.5" y1="24.5" x2="11.2" y2="28.8"/>
        <line x1="13.4" y1="8" x2="16.6" y2="14"/>
        <line x1="23.4" y1="26" x2="26.6" y2="32"/>
        <line x1="8" y1="26.6" x2="14" y2="23.4"/>
        <line x1="26" y1="16.6" x2="32" y2="13.4"/>
      </g>
      <g id="spotlight" stroke="#F97316" stroke-width="1.4" opacity="0.6">
        <line x1="20" y1="5" x2="10" y2="18"/>
        <line x1="20" y1="5" x2="14" y2="20"/>
        <line x1="20" y1="5" x2="20" y2="22"/>
        <line x1="20" y1="5" x2="26" y2="20"/>
        <line x1="20" y1="5" x2="30" y2="18"/>
      </g>
      <g id="athlete-victory" class="logo-accent">
        <circle cx="20" cy="11.5" r="2.5"/>
        <path d="M18.5 13.8 L21.5 13.8 L21.2 21 L18.8 21 Z"/>
        <path d="M18.5 14 L13 7 L14.2 6.2 L19 12.5 Z"/>
        <path d="M21.5 14 L27 7 L25.8 6.2 L21 12.5 Z"/>
        <path d="M19 21 L17.5 31 L19 31.2 L20.2 21 Z"/>
        <path d="M21 21 L22.5 31 L21 31.2 L19.8 21 Z"/>
      </g>
      <path d="M9 34 Q20 36 31 34" fill="none" stroke="#F97316" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
    </g>
    <g id="wordmark" transform="translate(56, 14)">
      <text x="0" y="22" class="logo-text-bharat">
        <tspan class="logo-text-bharat">Bharat </tspan>
        <tspan class="logo-text-athlete">Athlete</tspan>
      </text>
    </g>
  </g>
</svg>
